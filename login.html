<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Latihan Soal</title>

    <link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="container">

    <h1>📚 Latihan Soal Online</h1>

    <p class="subtitle">
        Silakan isi data sebelum memulai latihan.
    </p>

    <form id="loginForm">

        <label>Nama Peserta</label>

        <input
            type="text"
            id="nama"
            placeholder="Masukkan nama lengkap">

        <label>Kelas</label>

        <select id="kelas">
            <option value="">Pilih Kelas</option>
            <option>7</option>
            <option>8</option>
            <option>9</option>
        </select>

        <label>Mata Pelajaran</label>

        <select id="mapel">
            <option value="">Pilih Mata Pelajaran</option>
            <option>Matematika</option>
            <option>IPA</option>
            <option>IPS</option>
            <option>Bahasa Indonesia</option>
            <option>Bahasa Inggris</option>
        </select>

        <button type="submit">
            Mulai Latihan
        </button>

    </form>

</div>

<script src="js/login.js"></script>

</body>
</html>
